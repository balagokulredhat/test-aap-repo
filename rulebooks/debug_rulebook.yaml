---
- name: Listen to Events
  hosts: localhost
  sources:
    - name: Listen to the Host and Port
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: EDA handling the triggers from the demo 1 | Monitoring tool [Only a file]
      condition: event.payload.data is defined 
      actions:
        - debug:
            msg: "Received event: {{ event.payload.data }}"
